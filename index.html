<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Авторизація успішна</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Roboto',sans-serif;
background:#f2f4f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#fff;
width:360px;
padding:40px 30px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
text-align:center;
}

.logo{
font-size:26px;
font-weight:700;
color:#002f34;
margin-bottom:20px;
}

h1{
font-size:20px;
margin:0 0 12px;
color:#002f34;
}

p{
font-size:14px;
color:#406367;
margin-bottom:25px;
}

.btn{
display:block;
background:#002f34;
color:#fff;
padding:14px;
border-radius:6px;
text-decoration:none;
font-weight:700;
}

.btn:hover{
opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">Авторизація</div>

<h1>Авторизація пройшла успішно</h1>

<p>Ви можете повернутися до застосунку та продовжити роботу.</p>

<a href="/" class="btn">Повернутися</a>

</div>

</body>
</html>
