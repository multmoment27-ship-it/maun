<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Авторизація успішна</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
    --olx-dark:#002f34;
    --olx-mint:#23e5db;
    --bg:#f2f4f5;
}

body{
    margin:0;
    font-family:'Roboto',sans-serif;
    background:var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.container{
    background:white;
    width:90%;
    max-width:420px;
    padding:35px 25px;
    border-radius:6px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
    text-align:center;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:var(--olx-dark);
    margin-bottom:20px;
}

h1{
    font-size:22px;
    margin:0 0 10px 0;
    color:var(--olx-dark);
}

p{
    font-size:14px;
    color:#406367;
    margin-bottom:25px;
}

.btn{
    display:block;
    width:100%;
    padding:16px;
    background:var(--olx-dark);
    color:white;
    text-decoration:none;
    font-weight:700;
    border-radius:4px;
    transition:opacity .2s;
}

.btn:active{
    opacity:.8;
}

.footer{
    margin-top:20px;
    font-size:11px;
    color:#8fa3a6;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">OLX</div>

<h1>Авторизація пройшла успішно</h1>

<p>
Ви можете повернутися до застосунку та продовжити роботу.
</p>

<a href="#" class="btn">Повернутися в застосунок</a>

<div class="footer">
© 2026
</div>

</div>

</body>
</html>
